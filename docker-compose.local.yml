version: "3.8"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ntd
      POSTGRES_PASSWORD: ntd
      POSTGRES_DB: ntd
    ports:
      - "5432:5432"
    volumes:
      - ntd-local-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ntd"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3456:80"
    environment:
      DATABASE_URL: postgresql://ntd:ntd@db:5432/ntd
    depends_on:
      db:
        condition: service_healthy

volumes:
  ntd-local-db:
